<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fes Route Prototype</title>
    <link rel="stylesheet" href="../src/styles/app.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div>
          <p class="eyebrow">Fes Route / Prototype</p>
          <h1>フェスの周り順を、その場で組んで共有</h1>
          <p class="lede">サンプルタイムテーブルを見ながら、見たいアーティストを選ぶと周り順を自動で並べます。URL 共有もここで試せます。</p>
        </div>
        <div class="hero-actions">
          <button id="share-button" class="primary">共有URLをコピー</button>
          <button id="reset-button" class="ghost">選択をリセット</button>
        </div>
      </header>

      <main class="layout">
        <section class="panel main-panel">
          <div class="panel-header">
            <div>
              <h2 id="event-name"></h2>
              <p id="event-meta" class="muted"></p>
            </div>
            <div class="legend">
              <span><i class="dot selected"></i>選択中</span>
              <span><i class="dot conflict"></i>時間衝突あり</span>
            </div>
          </div>
          <div id="empty-state" class="empty-state" hidden></div>
          <div id="timetable" class="timetable"></div>
        </section>

        <aside class="sidebar">
          <section class="panel">
            <div class="panel-header stacked">
              <div>
                <h2>管理入力</h2>
                <p class="muted">イベント、ステージ、タイムテーブルを手動で登録します。</p>
              </div>
              <label class="field">
                <span>編集中のイベント</span>
                <select id="event-switcher"></select>
              </label>
            </div>

            <div class="admin-stack">
              <form id="event-form" class="admin-form">
                <h3>イベント行を追加</h3>
                <p id="event-form-message" class="form-message" hidden></p>
                <label class="field">
                  <span>イベント名</span>
                  <input id="event-form-name" name="name" type="text" placeholder="Tokyo Sound Weekend 2026" required />
                </label>
                <div class="field-row">
                  <label class="field">
                    <span>開催日</span>
                    <input id="event-form-date" name="startDate" type="date" required />
                  </label>
                  <label class="field">
                    <span>終了日</span>
                    <input id="event-form-end-date" name="endDate" type="date" />
                  </label>
                </div>
                <label class="field">
                  <span>会場</span>
                  <input id="event-form-venue" name="venueName" type="text" placeholder="Shinkiba Bay Area" required />
                </label>
                <button class="primary" type="submit">イベントを追加</button>
              </form>

              <form id="stage-form" class="admin-form">
                <h3>ステージ行を追加</h3>
                <p id="stage-form-message" class="form-message" hidden></p>
                <label class="field">
                  <span>ステージ名</span>
                  <input id="stage-form-name" name="name" type="text" placeholder="Sunrise Stage" required />
                </label>
                <label class="field">
                  <span>短縮名</span>
                  <input id="stage-form-short-name" name="shortName" type="text" placeholder="Sunrise" />
                </label>
                <button class="primary" type="submit">ステージを追加</button>
              </form>

              <form id="entry-form" class="admin-form">
                <h3>タイムテーブル行を追加</h3>
                <p id="entry-form-message" class="form-message" hidden></p>
                <label class="field">
                  <span>アーティスト名</span>
                  <input id="entry-form-artist" name="artist" type="text" placeholder="New Band" required />
                </label>
                <label class="field">
                  <span>ステージ</span>
                  <select id="entry-form-stage" name="stageId" required></select>
                </label>
                <div class="field-row">
                  <label class="field">
                    <span>開始</span>
                    <input id="entry-form-start" name="start" type="time" required />
                  </label>
                  <label class="field">
                    <span>終了</span>
                    <input id="entry-form-end" name="end" type="time" required />
                  </label>
                </div>
                <button class="primary" type="submit">タイムテーブル行を追加</button>
              </form>
            </div>
          </section>

          <section class="panel">
            <h2>あなたの周り順</h2>
            <p id="route-summary" class="muted">まだ未選択です。</p>
            <ol id="route-list" class="route-list"></ol>
          </section>

          <section class="panel">
            <h2>このプロトタイプで見たいこと</h2>
            <ul class="notes">
              <li>タイムテーブルから迷わず選べるか</li>
              <li>時間衝突がすぐ分かるか</li>
              <li>共有URLだけで十分か</li>
            </ul>
          </section>
        </aside>
      </main>
    </div>

    <script type="module" src="../src/app.js"></script>
  </body>
</html>
